name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Restore release data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/releases/0.4.0-beta/documented
          gh release download v0.4.0-beta \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "tu-dien-tieng-viet-0.4.0-beta-documented.tar.gz" \
            --dir data/releases/0.4.0-beta/documented \
            --clobber
          tar -xzf data/releases/0.4.0-beta/documented/tu-dien-tieng-viet-0.4.0-beta-documented.tar.gz -C .

      - name: Build static Pages site
        run: npm run pages:build
        working-directory: web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
